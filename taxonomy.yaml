schema_version: 1
default_label: "未分类"
default_secondary_label: "其他"

notes:
  - "本文件用于维护一级领域与二级领域的受控标签体系。"
  - "建议模型只在给定一级或二级候选中选择，避免自由生成导致标签漂移。"
  - "如遇无法准确归类的论文，可回退到对应一级领域下的“其他”。"

