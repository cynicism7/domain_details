literature_dirs:
  - "./papers"

extensions:
  - ".pdf"

# 当前版本使用 taxonomy 驱动的两级分类。
# 用户可直接修改本文件中的模型、输入长度和输出路径，
# 也可编辑 taxonomy.yaml 自定义一级/二级领域及别名。
llm:
  provider: "openai_api"
  model: "Qwen2.5-3B-Instruct"
  api_base: "http://127.0.0.1:1234/v1"
  api_key: "lm-studio"
  max_tokens: 64
  temperature: 0.0
  timeout: 60
  stream: true
  warmup: false
  # system_prompt: "你是分类器。禁止 <think>，只输出一行 {\"field\": \"学科名称\"}。"

taxonomy_path: "./taxonomy.yaml"

# 送给模型的文本会优先包含：标题、关键词、摘要、引言片段，必要时补正文片段。
max_chars_for_llm: 2000

# 单次请求总字符数上限，避免本地模型上下文过长导致内存越界。
max_prompt_chars: 4096

# 仅串行模式生效；显存够时可适当调大，减少频繁卸载。
clear_context_every_n: 50

# 需要服务端支持并发请求时再调高。
concurrency: 1

output:
  csv_path: "./literature_domains.csv"
  log_path: "./scan.log"
